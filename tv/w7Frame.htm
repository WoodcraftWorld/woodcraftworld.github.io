<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win 7 Frame</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #wrapper {
            width: 1030px;
            height: 650px;
            position: absolute; 
            transform-origin: center center;
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="wrapper">
        <iframe id="dynamic-iframe"></iframe>
    </div>
    <script>
        
        const urlParams = new URLSearchParams(window.location.search);
        
        const page = urlParams.get('page');
        if (page) {
            document.getElementById('dynamic-iframe').src = "./internalFrame.htm?page="+page;
        } else {
            console.log("No page parameter provided in the URL.");
        }
    </script>

    <script>
        const wrapper = document.getElementById('wrapper');
        const baseWidth = 1030;
        const baseHeight = 640;

        function scaleToFit() {
            const winWidth = window.innerWidth;
            const winHeight = window.innerHeight;
            const scaleX = winWidth / baseWidth;
            const scaleY = winHeight / baseHeight;
            const scale = Math.min(scaleX, scaleY);

            wrapper.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', scaleToFit);
        window.addEventListener('load', scaleToFit);
    </script>
</body>
</html>
