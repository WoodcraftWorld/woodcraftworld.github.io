<html>
<head>
<style>
  body, html {
    height: 100%;
    margin: 0;
    background-color: #fafafa; /* Dark theme for a cleaner look */
    color: white;
  }

  .container {
    display: flex;
    flex-direction: column; /* Stacks elements vertically */
    justify-content: center; 
    align-items: center;     
    height: 100vh;
    gap: 20px; /* Adds space between the audio and the GIF */
  }

  
  .centred-gif {
    width: 350px;  
    height: auto; 
    border-radius: 8px; 
  }

  audio {
    filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5)); /* Optional: adds depth */
  }
</style>
</head>
<body>

<div class="container">
    <audio controls loop>
        <source src="/error/new_404.mp3" type="audio/mpeg">
        <source src="/error/new_404.aac" type="audio/aac">
        Your browser does not support the audio element.
    </audio>
  <img src="/error/new_404.gif" class="centred-gif" alt="404 - File not found&excl; Ensure the URL is correctly typed and that there are no spelling errors">
</div>

</body>
</html>
