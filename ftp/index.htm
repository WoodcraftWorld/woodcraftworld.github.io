<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WoodcraftWorld Download Centre</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background: radial-gradient(circle, #560dfc, #7d00ff); padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        #browser { background: white; border: 1px solid #d0d7de; border-radius: 6px; list-style: none; padding: 0; overflow: hidden; }
        li { padding: 12px 16px; border-bottom: 1px solid #d0d7de; cursor: pointer; display: flex; align-items: center; transition: 0.2s; }
        li:hover { background: #f3f4f6; }
        li:last-child { border-bottom: none; }
        
        .icon { margin-right: 12px; width: 20px; text-align: center; font-size: 1.1em; }
        .folder-icon { color: #54aeff; }
        .file-icon { color: #57606a; }
        .file-name { color: #0969da; text-decoration: none; font-weight: 500; }
        
        .back-btn { margin-bottom: 15px; cursor: pointer; color: #0969da; border: 1px solid #d0d7de; background: white; padding: 6px 12px; border-radius: 6px; font-weight: bold; }
        .back-btn:hover { background: #f3f4f6; }
        li {
    display: flex;
    align-items: center;
    gap: 10px; 
    padding: 8px 12px;
}

.icon img {
    display: block;
    /*image-rendering: pixelated;*/
}
    </style>
</head>
<body>
    <div align="center">
<table class="bodyclass" border="0" width="80%">
	<tr>
		<td><center><a href="../index.htm"><img border="0" src="../images/logohome.png" width="40%" alt="WoodcraftWorld Logo & Home button"></a></center></td>	
	</tr>
	<tr>
		<td><center><img border="0" src="../images/downloadcentre.png" width="50%" alt="Download Centre"></center></td>
	</tr>
    </table></div>
    <div class="container">
        <button class="back-btn" id="backBtn" style="display:none;"><i class="fa-solid fa-arrow-left"></i> Back</button>
        <ul id="browser">
            </ul>
    </div>

    <script src="downloads.js"></script>
</body>
</html>
